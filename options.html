<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Groopa Settings</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
    }
    h1 { margin: 0 0 20px 0; font-size: 22px; }
    .option {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .option input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
    .option label { cursor: pointer; }
    .btn {
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      background: #1877f2;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .btn:hover { background: #166fe5; }
    #save-message { margin-top: 12px; font-size: 13px; color: #0a0; }
  </style>
</head>
<body>
  <h1>Groopa Settings</h1>

  <div class="option">
    <input type="checkbox" id="sound-enabled" />
    <label for="sound-enabled">Sound notification</label>
  </div>

  <button id="save-btn" class="btn">Save</button>
  <p id="save-message" style="display: none;">Settings saved.</p>

  <script src="options.js"></script>
</body>
</html>
