<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Groopa Settings</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
    }
    h1 { margin: 0 0 20px 0; font-size: 22px; }
    .option {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .option input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
    .option label { cursor: pointer; }
    .field { margin-bottom: 16px; }
    .field label { display: block; margin-bottom: 6px; font-weight: 500; }
    .field textarea {
      width: 100%;
      padding: 10px;
      font-family: inherit;
      font-size: 13px;
      border: 1px solid #ccc;
      border-radius: 6px;
      resize: vertical;
    }
    .btn {
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      background: #1877f2;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .btn:hover { background: #166fe5; }
    .btn-secondary { background: #555; }
    .btn-secondary:hover { background: #444; }
    #save-message { margin-top: 12px; font-size: 13px; color: #0a0; }
    #demo-message { color: #0a0; }
    .groups-list { margin-bottom: 8px; }
    .group-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      margin-bottom: 8px;
      background: #f5f5f5;
      border-radius: 6px;
      border: 1px solid #eee;
    }
    .group-row .group-info { flex: 1; min-width: 0; }
    .group-row .group-name { font-weight: 500; color: #1a1a1a; }
    .group-row .group-url { font-size: 12px; color: #1877f2; word-break: break-all; }
    .group-row .group-url a { color: #1877f2; }
    .group-row .group-meta { font-size: 11px; color: #666; margin-top: 4px; }
    .group-row .track-option { flex-shrink: 0; display: flex; align-items: center; gap: 6px; }
    .group-row .track-option input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
    .group-row .track-option label { cursor: pointer; font-size: 13px; }
    .groups-empty { font-size: 13px; color: #888; padding: 12px; background: #f8f8f8; border-radius: 6px; }
  </style>
</head>
<body>
  <h1>Groopa Settings</h1>

  <div class="option">
    <input type="checkbox" id="paid-user" />
    <label for="paid-user">Paid user access (development)</label>
  </div>

  <div class="field">
    <label for="keywords">Keywords (one per line)</label>
    <textarea id="keywords" rows="6" placeholder="e.g.&#10;alert&#10;urgent"></textarea>
  </div>

  <div class="option">
    <input type="checkbox" id="sound-enabled" />
    <label for="sound-enabled">Sound notification</label>
  </div>

  <button id="save-btn" class="btn">Save Settings</button>
  <p id="save-message" style="display: none;">Settings saved.</p>

  <h2 style="margin: 24px 0 12px 0; font-size: 16px;">Detected groups</h2>
  <p style="margin: 0 0 10px 0; font-size: 13px; color: #555;">Choose which groups to track. Toggling Track updates immediately.</p>
  <div id="detected-groups" class="groups-list"></div>

  <h2 style="margin: 24px 0 12px 0; font-size: 16px;">Demo data (for UI testing)</h2>
  <div style="display: flex; gap: 10px; flex-wrap: wrap;">
    <button id="load-demo-btn" class="btn btn-secondary">Load Demo Data</button>
    <button id="clear-demo-btn" class="btn btn-secondary">Clear Demo Data</button>
  </div>
  <p id="demo-message" style="display: none; margin-top: 8px; font-size: 13px;"></p>

  <script src="storage.js"></script>
  <script src="options.js"></script>
</body>
</html>
