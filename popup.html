<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Groopa</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <h1 class="title">Groopa</h1>

    <div class="card status-card">
      <h2 class="card-title">Status</h2>
      <p id="status-text" class="card-content">Loading…</p>
    </div>

    <div class="card next-steps-card">
      <h2 class="card-title">Next steps</h2>
      <p class="card-content">Configure your settings and visit a Facebook group to start monitoring.</p>
    </div>

    <button id="open-settings" class="btn">Open Settings</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
